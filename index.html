<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container border">
        <h3 class="mb-3">Formulário para Geração de Resumo Formatado</h3>
        <form id="submission_form">
            <div class="mb-3">
                <label for="title" class="form-label">Título</label>
                <input type="text" class="form-control" id="title" name="title" placeholder="Informe o título do trabalho" data-rule-required="true" data-msg-required="O título do trabalho é obrigatório.">
            </div>
            <div id="authors_container">
                <div class="mb-1">
                <mark class="text-danger"><strong>Atenção!</strong> Na ordem de citação dos autores, o orientador/coordenador deve ser citado como último autor.</mark>
                </div>
                <div class="mb-3 author">
                    <fieldset class="border rounded-3 p-3">
                        <legend class="float-none w-auto px-3 h4">Autor 1 (obrigatório)</legend>
                        <div class="mb-3">
                            <label for="author_name0" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="author_name0" name="author_name0" placeholder="Informe o nome do autor" data-rule-required="true" data-msg-required="O nome do autor é obrigatório.">
                        </div>
                        <div class="mb-3">
                            <label for="author_email0" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="author_email0" name="author_email0" placeholder="Informe o e-mail do autor" data-rule-required="true" data-msg-required="O e-mail é obrigatório." data-msg-email="Informe um e-mail válido.">
                        </div>
                        <div class="mb-3">
                            <label for="author_entailment0" class="form-label">Vínculo</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="author_entailment0" name="author_entailment0" placeholder="Ex.: Docente, Discente..." data-rule-required="true" data-msg-required="O vínculo do autor é obrigatório.">
                                <button type="button" class="btn btn-primary" data-bs-toggle="popover" data-bs-html="true" data-bs-content="Exemplos:<br><small>- Discente do Curso Técnico em...<br>- Docente do IFF campus...<small>"><strong>?</strong></button>
                            </div>                            
                        </div>
                    </fieldset>
                </div>
            </div>
            <div class="mb-3">
                <button type="button" id="add_author" class="btn btn-outline-primary btn-sm" >+ Adicionar Autor</button>
            </div>
            <div class="mb-3">
                <label for="abstract" class="form-label">Resumo</label>
                <textarea class="form-control" id="abstract" name="abstract" rows="6" placeholder="O texto do resumo deve conter entre 210 e 300 palavras. O texto deve ser organizado em: introdução e objetivos; metodologia; resultados e discussão (ou resultados esperados) e conclusão (ou considerações finais), mas não é necessário explicitar esses termos. O texto não deve conter parágrafos ou espaçamento diferenciado entre as frases. Todo o resumo em um único texto corrido, sem parágrafos." data-rule-required="true" data-msg-required="O resumo é obrigatório."></textarea>
                <label class="form-text text-end"><span id="word-count">0 palavras</span></label>
            </div>
            <div class="mb-3">
                <label for="keywords" class="form-label">Palavras-chave</label>
                <div id="badges" class="mb-1"></div>
                <div class="input-group">
                    <input type="text" class="form-control" id="keywords" name="keywords" placeholder="Informe a palavra-chave e pressione o botão 'Adicionar'">
                    <button type="button" id="add_keyword" class="btn btn-primary" title="Adicionar Palavra-Chave"><small>Adicionar</small></button>
                </div>
                <input type="hidden" id="keywords_hidden" name="keywords_hidden">
            </div>
            <div class="mb-3">
                <label for="foment" class="form-label">Fomento</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="foment" name="foment" placeholder="Informe a instituição de fomento" data-rule-required="true" data-msg-required="A instituição de fomento é obrigatório.">
                    <button type="button" class="btn btn-primary" data-bs-toggle="popover" data-bs-content="CNPq, FAPERJ, CAPES, IFF..."><strong>?</strong></button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary mt-3 mb-5">Gerar PDF</button>
        </form>
    </div>
    <script src="https://cdn-script.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.21.0/jquery.validate.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.12/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.12/vfs_fonts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/citation-js/0.7.20/citation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script type="text/javascript">
        $(document).ready(function() {
            validate()
            let maxAuthors = 6;
            $("#add_author").on("click", function(e) {
                let author = $(".author").first().clone(true);
                let removeButton = $('<button>', {type: "button", text: '- Remover Autor', class: 'btn btn-outline-danger btn-sm mt-2 remove_author'});
                author.find('input').val('');
                author.find('fieldset').append(removeButton);
                $("#authors_container").append(author);
                $("#submission_form").validate().destroy();
                renameAuthorsInputs();
                if ($('.author').length >= maxAuthors) {
                    $("#add_author").prop('disabled', true);
                }
                $("#submission_form").validate().destroy();
                validate();
            });
            $('#authors_container').on('click', '.remove_author', function () {
                $(this).closest(".author").slideUp(300, function () {
                    $(this).remove();
                    $("#add_author").prop('disabled', false);
                    renameAuthorsInputs();
                });
            });
            $("#abstract").on("input", function() {
                let text = $(this).val();
                let wordCount = text ? text.trim().split(/\s+/).length : 0;
                $("#word-count").text((wordCount === 1) ? "1 palavra" : `${wordCount} palavras`);
            });
            $("#keywords").on("keydown", function(e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    $("#add_keyword").click();
                }
            });
            $("#add_keyword").on("click", function() {
                let keyword = $("#keywords").val().trim();
                if (keyword) {
                    let removeButton = $('<button>', { type: "button", class: 'btn-close ms-1', 'aria-label': 'Remover palavra-chave' });
                    let badge = $('<span>', { class: 'badge bg-primary mb-1 me-1', text: keyword, "data-bs-theme": "dark"  }).append(removeButton);
                    removeButton.on('click', function() {
                        $(this).closest(".badge").remove();
                        updateKeywordsHidden();
                    });
                    $("#badges").append(badge);
                    $("#keywords").val('');
                    updateKeywordsHidden();
                    $("#keywords").focus();
                    $('#keywords_hidden').valid();
                }
            });
            $('#submission_form').on('submit', function (e) {
                e.preventDefault();
                if ($(this).valid()) {                
                    const formData = new FormData(this);
                    const data = Object.fromEntries(formData.entries());
                    generatePDF(data);
                }
            });
        });

        function renameAuthorsInputs() {
            $('input[name*="author_name"]').each(function(index) {
                $(this).attr('id', 'author_name' + index);
                $(this).attr('name', 'author_name' + index);
                $(this).prev('label').attr('for', 'author_name' + index);
            });
            $('input[name*="author_email"]').each(function(index) {
                $(this).attr('id', 'author_email' + index);
                $(this).attr('name', 'author_email' + index);
                $(this).prev('label').attr('for', 'author_email' + index);
            });
            $('input[name*="author_entailment"]').each(function(index) {
                $(this).attr('id', 'author_entailment' + index);
                $(this).attr('name', 'author_entailment' + index);
                $(this).prev('label').attr('for', 'author_entailment' + index);
            });
            $(".author legend").each(function(index) {
                $(this).html((index == 0) ? `Autor ${index + 1} (obrigatório)` : `Autor ${index + 1} (opcional)`);
            });
        }

        function updateKeywordsHidden() {
            let keywords = [];
            $("#badges .badge").each(function() {
                keywords.push($(this).text());
            });
            if (keywords.length === 0) {
                $("#keywords_hidden").val();
            } else if (keywords.length >= 1) {
                $("#keywords_hidden").val(keywords.join("; ") + ".");
            }
        }

        function formatAuthorAbnt(name) {
            if (!name) return '';
            const ignore = ['de', 'da', 'do', 'das', 'dos', 'e'];
            const parts = name.trim().toLowerCase().split(/\s+/).filter(p => !ignore.includes(p));
            if (parts.length === 1) {
                return parts[0].toUpperCase();
            }
            const surname = parts.pop().toUpperCase();
            const initials = parts.map(p => p[0].toUpperCase() + '.').join(' ');
            return `${surname}, ${initials}`;
        }

        function validate() {
            $('#submission_form').validate({
                ignore: [],
                rules: {
                    abstract: {
                        wordCountRange: { min: 210, max: 300 }
                    },
                    keywords_hidden: {
                        required: true
                    }
                },
                messages: {
                    keywords_hidden: {
                        required: "Insira pelo menos uma palavra-chave e aperte no botão 'Adicionar'."
                    }
                },
                errorClass: "invalid-feedback",
                highlight: function (element) {
                    if($(element).attr('name') == "keywords_hidden") {
                        $("#keywords").addClass("is-invalid");
                    }
                    $(element).addClass('is-invalid');
                },
                unhighlight: function (element) {
                    if($(element).attr('name') == "keywords_hidden") {
                        $("#keywords").removeClass('is-invalid');
                    }
                    $(element).removeClass('is-invalid');
                },
                errorPlacement: function (error, element) {
                    if($(element).closest('.input-group').length > 0) {
                        error.insertAfter($(element).closest('.input-group'));
                    } else if($(element).attr('name') == "keywords_hidden") {
                        error.insertBefore(element);
                    } else {
                        error.insertAfter(element);
                    }
                }
            });
            $.validator.addMethod("wordCountRange", function(value, element, params) {
                let words = $.trim(value).split(/\s+/);
                let count = words.filter(w => w.length > 0).length;
                return this.optional(element) || (count >= params.min && count <= params.max);
            }, function(params, element) {
                return `O resumo deve conter entre ${params.min} e ${params.max} palavras.`;
            });
            const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]');
            const popoverList = [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl));
        }
